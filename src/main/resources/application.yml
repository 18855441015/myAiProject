server:
  port: 8080

spring:
  application:
    name: examproject
  ai:
    mcp:
      client:
        enabled: true
        name: my-mcp-client
        version: 1.0.0
        request-timeout: 30s
        type: ASYNC
        stdio:
            servers-configuration: classpath:/tavily-mcp-server.json

# Agent 配置
agent:
  api-key: "your api key"
  model: "MiniMax-M2.7"
  base-url: "https://api.minimaxi.com/anthropic"
  workspace: /Users/dw   # Agent的工作根目录
  max-iterations: 30        # 最大循环次数（防无限循环）
  command-timeout: 60       # 命令执行超时(秒)
  allowed-paths:            # 安全白名单：允许所有目录
    - /
  blocked-commands:         # 危险命令黑名单（为空表示不禁用任何命令）
    - "rm -rf /"
  max-summary-token: 8096   # 生成摘要时最大使用token数
